<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sweet Delights Bakery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff8f0;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #ffcccc;
            padding: 20px 0;
        }
        header img {
            width: 100px;
            height: auto;
        }
        header h1 {
            margin: 10px 0 0 0;
            font-size: 2em;
        }
        header p {
            margin: 5px 0 0 0;
            font-size: 1.2em;
            color: #555;
        }
        .cake-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }
        .cake-card {
            width: 250px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 10px;
        }
        .cake-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }
        .cake-card h3 {
            margin: 10px 0 0 0;
        }
        footer {
            background-color: #ffcccc;
            padding: 20px 0;
            margin-top: 20px;
        }
        footer a {
            color: #333;
            text-decoration: none;
            margin: 0 10px;
        }
        .map-container {
            margin: 30px 0;
        }
    </style>
</head>
<body>

<header>
   <img src="cake.jpg" alt="A three-tiered wedding cake decorated with white and peach roses and daisies" width="400">
    <h1>Sweet Delights Bakery</h1>
    <p>"Baking Happiness in Every Slice!"</p>
</header>

<section class="cake-container">
    <div class="cake-card">
        <img src="images/chocolate.jpg" alt="Chocolate Cake">
        <h3>Chocolate Cake</h3>
    </div>
    <div class="cake-card">
        <img src="images/redvelvet.jpg" alt="Red Velvet Cake">
        <h3>Red Velvet Cake</h3>
    </div>
    <div class="cake-card">
        <img src="images/cherry.jpg" alt="Cherry Flavoured Cake">
        <h3>Cherry Flavoured Cake</h3>
    </div>
    <div class="cake-card">
        <img src="images/strawberry.jpg" alt="Strawberry Cake">
        <h3>Strawberry Cake</h3>
    </div>
    <div class="cake-card">
        <img src="images/pineapple.jpg" alt="Pineapple Cake">
        <h3>Pineapple Cake</h3>
    </div>
</section>

<section class="map-container">
    <h2>Our Location</h2>
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3532.062378462536!2d83.476035!3d27.695110!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39959a82d5a4b2b3%3A0x63b41e1a3ee8dfd6!2sTilotamma%20Butwal!5e0!3m2!1sen!2snp!4v1699558670000!5m2!1sen!2snp" 
        width="80%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</section>

<footer>
    <p>Contact us: <a href="tel:9745340190">9745340190</a> | Email: <a href="mailto:sweetdelightsbakery@gmail.com">sweetdelightsbakery@gmail.com</a></p>
    <p>Follow us on <a href="https://facebook.com/sweetdelightsbakery" target="_blank">Facebook</a></p>
    <p>Location: Tilotamma, Butwal</p>
</footer>

</body>
</html>
